[build]
  base = "frontend"
  publish = "build"
  command = "CI= npm run build"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── SEO Pre-rendering Edge Function ──
# Runs on every request to inject correct <title>, <meta>, <canonical>
# per route so Google indexes each page properly.
[[edge_functions]]
  function = "seo-prerender"
  path = "/*"

# Security & Performance Headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
